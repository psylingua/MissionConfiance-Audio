<div class="container">
  <div class="header">

<script>
const pages = [
  // PAGE 1 — Couverture
  [{type:"narrative",label:"Titre",fr:"Mission Confiance. Le grand cahier de vacances et d'exercices trilingue des émotions, de la confiance en soi et des super-pouvoirs du cerveau. Par Estrella Vallecillo, psychologue. Psy lingoua.",es:"Misión Confianza. El gran cuaderno de vacaciones y ejercicios trilingüe. Por Estrella Vallecillo, psicóloga. Psi Lingua.",en:"Mission Confidence. The great trilingual holiday workbook of emotions, self-confidence and brain superpowers. By Estrella Vallecillo, psychologist. PsyLingua."}],
  // PAGE 2 — Coloriage intérieur
  [{type:"bubble",label:"Ángeles",fr:"Prêt·e pour l'aventure ?",es:"¿Listo o lista para la aventura?",en:"Ready for the adventure?"},{type:"bubble",label:"Jazz",fr:"Tu vas pas manger ce fromage ?",es:"¿No te vas a comer ese queso?",en:"Aren't you going to eat that cheese?"},{type:"bubble",label:"Ángeles",fr:"Jazz, c'est un cahier, pas un fromage.",es:"Jazz, es un cuaderno, no un queso.",en:"Jazz, it's a workbook, not a cheese."},{type:"sound",text:"What the fun !"}],
  // PAGE 3 — Crédits
  [{type:"narrative",label:"Titre",fr:"Mission Confiance. Cahier de vacances trilingue. Auteure : Estrella Vallecillo. Éditeur : Psy lingoua. Tous droits réservés.",es:"Misión Confianza. Cuaderno de vacaciones trilingüe. Autora: Estrella Vallecillo. Editor: Psi Lingua. Todos los derechos reservados.",en:"Mission Confidence. Trilingual holiday workbook. Author: Estrella Vallecillo. Publisher: PsyLingua. All rights reserved."}],
  // PAGE 4 — Sommaire
  [{type:"narrative",label:"Sommaire",fr:"Sommaire : Introduction. Mission 1 : Comprendre tes émotions. Mission 2 : Détective des pensées. Mission 3 : Mission Confiance. Mission 4 : Les mots qui protègent. Mission 5 : Super-héros de la planète. Solutions des jeux. Journal de Bord des 70 jours. Diplôme final. Le mot aux parents.",es:"Índice: Introducción. Misión 1: Comprender tus emociones. Misión 2: Detective de pensamientos. Misión 3: Misión Confianza. Misión 4: Las palabras que protegen. Misión 5: Superhéroes del planeta. Soluciones. Diario de 70 días. Diploma final. Palabras para los padres.",en:"Table of contents: Introduction. Mission 1: Understand your emotions. Mission 2: Thought detective. Mission 3: Mission Confidence. Mission 4: Words that protect. Mission 5: Planet superheroes. Solutions. 70-Day Logbook. Final diploma. A word to parents."},{type:"bubble",label:"Jazz",fr:"Le sommaire, c'est comme le menu d'un restaurant. Moi, je commande du fromage.",es:"El índice es como el menú de un restaurante. Yo pido queso.",en:"The table of contents is like a restaurant menu. I'll order cheese."}],
  // PAGE 5 — Bienvenue
  [{type:"narrative",label:"Titre",fr:"Bienvenue dans Mission Confiance !",es:"¡Bienvenido a Misión Confianza!",en:"Welcome to Mission Confidence!"},{type:"narrative",label:"Texte",fr:"Hello les super-héros ! Nous sommes Ángeles, Estrella et Jazz. Nous avons préparé 5 missions pour découvrir tes émotions, développer ta confiance et explorer les super-pouvoirs de ton cerveau. Prêt·e ? La Mission 1 t'attend !",es:"¡Hola superhéroes! Somos Ángeles, Estrella y Jazz. Hemos preparado 5 misiones para descubrir tus emociones, desarrollar tu confianza y explorar los superpoderes de tu cerebro. ¿Listo o lista? ¡La Misión 1 te espera!",en:"Hello superheroes! We are Ángeles, Estrella and Jazz. We have prepared 5 missions to discover your emotions, build your confidence, and explore your brain's superpowers. Ready? Mission 1 awaits!"},{type:"bubble",label:"Jazz",fr:"Fromage en option. Héroïsme fortement recommandé.",es:"Queso opcional. Heroísmo muy recomendado.",en:"Cheese optional. Heroism highly recommended."}],
  // PAGE 6 — Tes 5 missions
  [{type:"narrative",label:"Titre",fr:"Tes 5 missions. Que la confiance soit avec toi !",es:"Tus 5 misiones. ¡Que la confianza te acompañe!",en:"Your 5 missions. May confidence be with you!"},{type:"narrative",label:"Missions",fr:"Mission 1 : Comprendre tes émotions. Mission 2 : Détective des pensées. Mission 3 : Mission Confiance. Mission 4 : Les mots qui protègent. Mission 5 : Super-héros de la planète.",es:"Misión 1: Comprender tus emociones. Misión 2: Detective de pensamientos. Misión 3: Misión Confianza. Misión 4: Las palabras que protegen. Misión 5: Superhéroes del planeta.",en:"Mission 1: Understand your emotions. Mission 2: Thought detective. Mission 3: Mission Confidence. Mission 4: Words that protect. Mission 5: Planet superheroes."},{type:"bubble",label:"Jazz",fr:"Cinq missions. Cinq fromages. Mission fromage acceptée !",es:"Cinco misiones. Cinco quesos. ¡Misión queso aceptada!",en:"Five missions. Five cheeses. Cheese mission accepted!"}],
  // PAGE 7 — Mode d'emploi
  [{type:"narrative",label:"Titre",fr:"Mode d'emploi. Comment devenir un super-héros de la confiance.",es:"Instrucciones. Cómo convertirte en un superhéroe de la confianza.",en:"Instructions. How to become a confidence superhero."},{type:"narrative",label:"Règles",fr:"Pas de pression. Tu avances à ton rythme. La constance est ton arme secrète : un petit geste chaque jour est plus puissant qu'un grand effort une seule fois. La règle du fromage : s'amuser en apprenant. Et respecter le fromage.",es:"Sin presión. Avanzas a tu ritmo. La constancia es tu arma secreta. La regla del queso: divertirse aprendiendo. Y respetar el queso.",en:"No pressure. You go at your own pace. Consistency is your secret weapon. The cheese rule: have fun while learning. And respect the cheese."},{type:"bubble",label:"Jazz",fr:"C'est moi qui ai écrit ce mode d'emploi. Enfin, presque.",es:"Yo escribí estas instrucciones. Bueno, casi.",en:"I wrote these instructions. Well, almost."}],
  // PAGE 8 — Mission 1 ouverture
  [{type:"narrative",label:"Titre",fr:"Mission 1 : Comprendre tes émotions.",es:"Misión 1: Comprender tus emociones.",en:"Mission 1: Understand your emotions."},{type:"bubble",label:"Ángeles",fr:"Salut les super-héros ! Ici Ángeles. Parfois on ressent des choses très fortes : joie, colère, tristesse. Chez nous, quand une émotion très désagréable prend toute la place, on appelle ça une catastrophe intraplanétaire. Chaque émotion a un message. Quand on apprend à l'écouter, elle peut traverser notre cerveau et repartir. Prêt·e ? C'est parti !",es:"¡Hola superhéroes! Aquí Ángeles. A veces sentimos cosas muy fuertes: alegría, rabia, tristeza. En casa, cuando una emoción muy desagradable lo ocupa todo, lo llamamos una catástrofe intraplanetaria. Cada emoción tiene un mensaje. Cuando aprendemos a escucharlo, puede atravesar nuestro cerebro y marcharse. ¿Listo o lista?",en:"Hi superheroes! Ángeles here. Sometimes we feel really strong things: joy, anger, sadness. At home, when a really unpleasant emotion takes up all the space, we call it an intraplanetary catastrophe. Every emotion has a message. When we learn to listen to it, it can pass through our brain and leave. Ready?"},{type:"bubble",label:"Jazz",fr:"C'était un bâton de fenouil bio. Je suis un chien écolo.",es:"Era un palito de hinojo bio. Soy un perro ecológico.",en:"It was an organic fennel stick. I'm an eco-friendly dog."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Une catastrophe intraplanétaire, c'est quand une émotion très désagréable prend toute la place dans ton univers intérieur. Ça arrive. Et ça passe.",es:"La palabra justa. Una catástrofe intraplanetaria es cuando una emoción muy desagradable lo ocupa todo. Sucede. Y luego pasa.",en:"The right word. An intraplanetary catastrophe is when a very unpleasant emotion takes up all the space in your inner universe. It happens. And then it passes."}],
  // PAGE 9 — Roue des émotions
  [{type:"narrative",label:"Titre",fr:"Ta roue des émotions.",es:"Tu rueda de las emociones.",en:"Your wheel of emotions."},{type:"narrative",label:"Consigne",fr:"Choisis 6 émotions que tu ressens souvent. Écris leur nom dans chaque part du cercle. Dessine un visage qui représente chaque émotion.",es:"Elige 6 emociones que sientas a menudo. Escribe su nombre en cada parte del círculo. Dibuja una cara que represente cada emoción.",en:"Choose 6 emotions you feel often. Write their name in each part of the circle. Draw a face that represents each emotion."},{type:"bubble",label:"Jazz",fr:"J'ai une septième émotion : Fromage. On peut la mettre ?",es:"Tengo una séptima emoción: Queso. ¿Se puede añadir?",en:"I have a seventh emotion: Cheese. Can we add it?"}],
  // PAGE 10 — Météo intérieure
  [{type:"narrative",label:"Titre",fr:"La météo intérieure. Où sens-tu tes émotions dans ton corps ?",es:"El mapa del tiempo interior. ¿Dónde sientes tus emociones en el cuerpo?",en:"Your inner weather map. Where do you feel your emotions in your body?"},{type:"narrative",label:"Consigne",fr:"Pense à une émotion récente. Colorie sur la silhouette les endroits où tu la sens. Écris ce que tu ressens : chaud, froid, lourd, qui bouge.",es:"Piensa en una emoción reciente. Colorea en la silueta los lugares donde la sientes. Escribe lo que sientes: calor, frío, pesadez, movimiento.",en:"Think of a recent emotion. Color on the silhouette the places where you feel it. Write what you feel: hot, cold, heavy, moving."},{type:"bubble",label:"Jazz",fr:"Moi, quand j'ai faim, mon ventre fait des bugs sonores. C'est une émotion, ça ?",es:"Cuando tengo hambre, mi barriga hace bugs sonoros. ¿Eso es una emoción?",en:"When I'm hungry, my belly makes sound bugs. Is that an emotion?"},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. On appelle ça les sensations corporelles. Ton corps est le premier à savoir ce que tu ressens.",es:"La palabra justa. Esto se llama sensaciones corporales. Tu cuerpo es el primero en saber lo que sientes.",en:"The right word. These are called body sensations. Your body is the first to know what you feel."}],
  // PAGE 11 — Vague des émotions
  [{type:"narrative",label:"Titre",fr:"La vague des émotions. Tes émotions montent… et elles redescendent.",es:"La ola de las emociones. Tus emociones suben… y vuelven a bajar.",en:"The emotion wave. Your emotions rise… and then they fall."},{type:"narrative",label:"Consigne",fr:"Pense à une émotion d'aujourd'hui. Ferme les yeux. Imagine que cette émotion est une vague. Elle arrive, elle monte… puis elle redescend doucement. Respire avec la vague.",es:"Piensa en una emoción de hoy. Cierra los ojos. Imagina que esa emoción es una ola. Llega, sube… y luego baja suavemente. Respira con la ola.",en:"Think of an emotion from today. Close your eyes. Imagine that emotion is a wave. It comes, it rises… and then slowly goes down. Breathe with the wave."},{type:"bubble",label:"Jazz",fr:"Moi, je préfère les vagues de fromage. Mais je comprends l'idée.",es:"Yo prefiero las olas de queso. Pero entiendo la idea.",en:"I prefer cheese waves. But I get the idea."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. On appelle ça la régulation émotionnelle. Jazz appelle ça un Reset du processeur.",es:"La palabra justa. Se llama regulación emocional. Jazz lo llama un Reset del procesador.",en:"The right word. It's called emotional regulation. Jazz calls it a Processor Reset."}],
  // PAGE 12 — Jeux des émotions
  [{type:"narrative",label:"Titre",fr:"Jeux des émotions. Amuse-toi à trouver les mots dans les trois langues !",es:"Juegos de emociones. ¡Diviértete encontrando las palabras en los tres idiomas!",en:"Emotion games. Have fun finding the words in the three languages!"},{type:"narrative",label:"Consigne",fr:"Complète les mots manquants et relie chaque émotion au bon visage. Surprise, Sorpresa. Dégoût, Disgust. Orgullo, Pride. Honte, Shame. Jalousie, Celos. Amor, Love.",es:"Completa las palabras que faltan y une cada emoción con la cara correcta. Surprise, Sorpresa. Dégoût, Disgust. Orgullo, Pride. Honte, Shame. Jalousie, Celos. Amor, Love.",en:"Fill in the missing words and match each emotion to the correct face. Surprise, Sorpresa. Dégoût, Disgust. Orgullo, Pride. Honte, Shame. Jalousie, Celos. Amor, Love."},{type:"bubble",label:"Jazz",fr:"Moi, j'ai déjà trouvé le mot fromage dans toutes les langues.",es:"Yo ya encontré la palabra queso en todos los idiomas.",en:"I've already found the word cheese in all languages."}],
  // PAGE 13 — Respiration du chien couché
  [{type:"narrative",label:"Titre",fr:"La respiration du chien couché.",es:"La respiración del perro acostado.",en:"The lying dog breathing."},{type:"bubble",label:"Jazz",fr:"Moi, je respire comme ça toute la journée. Surtout après le fromage.",es:"Yo respiro así todo el día. Sobre todo después del queso.",en:"I breathe like this all day. Especially after cheese."},{type:"narrative",label:"Consigne",fr:"Allonge-toi. Pose une main sur ton ventre. Inspire par le nez comme si tu sentais un fromage. Expire par la bouche comme si tu soufflais sur une soupe chaude. Recommence 3 fois.",es:"Túmbate. Pon una mano sobre tu vientre. Inspira por la nariz como si olieras un queso. Espira por la boca como si soplases una sopa caliente. Repite 3 veces.",en:"Lie down. Place one hand on your belly. Breathe in through your nose as if smelling cheese. Breathe out through your mouth as if blowing on hot soup. Repeat 3 times."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Cette respiration calme ton processeur. C'est un mini reset.",es:"La palabra justa. Esta respiración calma tu procesador. Es un mini reset.",en:"The right word. This breathing calms your processor. It's a mini reset."}],
  // PAGE 14 — Dessine-toi Mission 1
  [{type:"narrative",label:"Titre",fr:"Dessine-toi avec ton super-pouvoir. Dessine-toi en train de reconnaître tes émotions.",es:"Dibújate con tu superpoder. Dibújate reconociendo tus emociones.",en:"Draw yourself with your superpower. Draw yourself recognizing your emotions."},{type:"bubble",label:"Jazz",fr:"Moi, je me dessine avec un fromage. Ça compte ?",es:"Yo me dibujo con un queso. ¿Eso cuenta?",en:"I draw myself with a cheese. Does that count?"}],
  // PAGE 15 — Compteur XP Mission 1
  [{type:"narrative",label:"XP Mission 1",fr:"Ton compteur d'XP Mission 1. Niveau 1, 100 XP : Roue des émotions. Niveau 2, 200 XP : Météo intérieure. Niveau 3, 300 XP : Vague des émotions. Niveau 4, 400 XP : Jeux des émotions. Niveau 5, 500 XP : Respiration du chien couché. Niveau 6, 600 XP : Dessine-toi.",es:"Tu contador de XP Misión 1. Nivel 1, 100 XP: Rueda de emociones. Nivel 2, 200 XP: Mapa interior. Nivel 3, 300 XP: Ola de emociones. Nivel 4, 400 XP: Juegos de emociones. Nivel 5, 500 XP: Respiración del perro. Nivel 6, 600 XP: Dibújate.",en:"Your XP counter Mission 1. Level 1, 100 XP: Emotion wheel. Level 2, 200 XP: Inner weather. Level 3, 300 XP: Emotion wave. Level 4, 400 XP: Emotion games. Level 5, 500 XP: Lying dog breathing. Level 6, 600 XP: Draw yourself."},{type:"bubble",label:"Jazz",fr:"Moi, je le remplirais de fromage fondu.",es:"Yo lo llenaría de queso fundido.",en:"I would fill it with melted cheese."}],
  // PAGE 16 — Mission 1 terminée
  [{type:"narrative",label:"Titre",fr:"Mission 1 terminée ! Bravo super-héros ! Tu as appris à nommer tes émotions, à les reconnaître dans ton corps et à les laisser passer comme des vagues. Badge : Détective des émotions.",es:"¡Misión 1 completada! Has aprendido a nombrar tus emociones, a reconocerlas en tu cuerpo y a dejarlas pasar como olas. Insignia: Detective de emociones.",en:"Mission 1 complete! You learned to name your emotions, recognize them in your body, and let them pass like waves. Badge: Emotion detective."},{type:"bubble",label:"Jazz",fr:"Moi, j'ai déjà fini mon fromage. On attaque la Mission 2 ?",es:"Yo ya terminé mi queso. ¿Atacamos la Misión 2?",en:"I've already finished my cheese. Shall we attack Mission 2?"}],
  // PAGE 17 — Mission 2 ouverture
  [{type:"narrative",label:"Titre",fr:"Mission 2 : Détective des pensées.",es:"Misión 2: Detective de pensamientos.",en:"Mission 2: Thought detective."},{type:"bubble",label:"Ángeles",fr:"Salut les super-héros ! Ici Ángeles. Mon radar social s'est enclenché à la piscine. Une amie était bizarre avec moi. Mais j'ai mené mon enquête. Elle avait un vrai souci, ça n'avait rien à voir avec moi. Mon cerveau m'avait raconté une histoire fausse. Dans cette mission, je vais t'apprendre à devenir un détective des pensées.",es:"¡Hola superhéroes! Aquí Ángeles. Mi radar social se activó en la piscina. Una amiga estaba rara conmigo. Pero investigué. Tenía un problema real, no tenía nada que ver conmigo. Mi cerebro me había contado una historia falsa. En esta misión, voy a enseñarte a ser un detective de pensamientos.",en:"Hi superheroes! Ángeles here. My social radar went off at the pool. A friend was acting weird with me. But I investigated. She had a real problem, and it had nothing to do with me. My brain had told me a false story. In this mission, I'm going to teach you to be a thought detective."},{type:"bubble",label:"Jazz",fr:"Moi aussi, je suis détective. J'enquête sur la disparition des fromages.",es:"Yo también soy detective. Investigo la desaparición de los quesos.",en:"I'm a detective too. I investigate the disappearance of cheeses."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Une pensée automatique arrive sans prévenir et n'est pas toujours vraie. Le cerveau invente parfois des histoires.",es:"La palabra justa. Un pensamiento automático llega sin avisar y no siempre es verdad. El cerebro a veces inventa historias.",en:"The right word. An automatic thought arrives without warning and is not always true. The brain sometimes invents stories."}],
  // PAGE 18 — D'où viennent les pensées
  [{type:"narrative",label:"Titre",fr:"D'où viennent les pensées ? Ton cerveau fabrique des pensées tout le temps.",es:"¿De dónde vienen los pensamientos? Tu cerebro fabrica pensamientos todo el tiempo.",en:"Where do thoughts come from? Your brain makes thoughts all the time."},{type:"bubble",label:"Jazz",fr:"Moi, toutes mes pensées viennent de mon ventre. Et elles parlent de fromage.",es:"Todos mis pensamientos vienen de mi barriga. Y hablan de queso.",en:"All my thoughts come from my belly. And they talk about cheese."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Ton cerveau fabrique des pensées automatiques. Certaines t'aident, d'autres te piègent. Apprendre à les reconnaître, c'est un super-pouvoir.",es:"La palabra justa. Tu cerebro fabrica pensamientos automáticos. Algunos te ayudan, otros te engañan. Aprender a reconocerlos es un superpoder.",en:"The right word. Your brain makes automatic thoughts. Some help you, others trick you. Learning to recognize them is a superpower."}],
  // PAGE 19 — What the Fuzz ou What the Fun
  [{type:"narrative",label:"Titre",fr:"Reconnaître une pensée What the Fuzz. Relie chaque pensée : What the Fun ou What the Fuzz ?",es:"Reconocer un pensamiento What the Fuzz. ¿What the Fun o What the Fuzz?",en:"Recognizing a What the Fuzz thought. What the Fun or What the Fuzz?"},{type:"narrative",label:"Consigne",fr:"J'apprends chaque jour : What the Fun. Je rate tout le temps : What the Fuzz. Je fais de mon mieux : What the Fun. Personne ne m'aime : What the Fuzz. J'avance pas à pas : What the Fun. C'est trop dur : What the Fuzz. Je suis fier ou fière de moi : What the Fun. Je ne suis pas doué ou douée : What the Fuzz.",es:"Aprendo cada día: What the Fun. Lo hago todo mal: What the Fuzz. Hago lo mejor que puedo: What the Fun. Nadie me quiere: What the Fuzz. Avanzo paso a paso: What the Fun. Es demasiado difícil: What the Fuzz. Estoy orgulloso: What the Fun. No tengo talento: What the Fuzz.",en:"I learn every day: What the Fun. I mess up all the time: What the Fuzz. I do my best: What the Fun. Nobody likes me: What the Fuzz. I move forward step by step: What the Fun. It's too hard: What the Fuzz. I'm proud of myself: What the Fun. I'm not talented: What the Fuzz."},{type:"bubble",label:"Jazz",fr:"Moi, mes pensées fromage, c'est du What the Fun direct.",es:"Mis pensamientos queso son What the Fun directo.",en:"My cheese thoughts are straight What the Fun."}],
  // PAGE 20 — Micro What the Fuzz / What the Fun
  [{type:"narrative",label:"Titre",fr:"Le Micro What the Fuzz / What the Fun. Transforme tes pensées What the Fuzz en pensées What the Fun.",es:"El Micrófono What the Fuzz / What the Fun. Transforma tus pensamientos.",en:"The What the Fuzz microphone. Transform your thoughts."},{type:"narrative",label:"Exemples",fr:"Je suis moche → Je suis unique. Je rate tout → J'apprends même quand je me trompe. Personne ne m'aime → Je suis entouré·e de personnes qui tiennent à moi. Je n'y arriverai jamais → J'ai déjà réussi des choses difficiles. C'est trop dur → Je fais une pause et je réessaie.",es:"Soy feo o fea → Soy único o única. Lo hago todo mal → Aprendo incluso cuando me equivoco. Nadie me quiere → Estoy rodeado de personas que me quieren. Nunca lo conseguiré → Ya he logrado cosas difíciles. Es demasiado difícil → Hago una pausa y lo intento de nuevo.",en:"I am ugly → I am unique. I mess up everything → I learn even when I make mistakes. Nobody likes me → I am surrounded by people who care about me. I will never make it → I have already achieved difficult things. It is too hard → I take a break and try again."},{type:"bubble",label:"Jazz",fr:"Mon micro à moi transforme tout en fromage. C'est un réglage spécial.",es:"Mi micro lo transforma todo en queso. Es un ajuste especial.",en:"My microphone transforms everything into cheese. It's a special setting."}],
  // PAGE 21 — Reset ton émotion
  [{type:"narrative",label:"Titre",fr:"Reset ton émotion. Et si tu redémarrais ton processeur pour voir les choses autrement ?",es:"Resetea tu emoción. ¿Y si reiniciaras tu procesador?",en:"Reset your emotion. What if you rebooted your processor to see things differently?"},{type:"bubble",label:"Ángeles",fr:"Un jour, une grosse fourmi m'a mordue. J'avais très peur des fourmis. Ma mère a créé un jeu : la première qui reçoit une fourmi sur le pied gagne une surprise ! Depuis, je cours vers les fourmis. Le reset : changer le sens d'une peur pour en faire un jeu.",es:"Un día, una hormiga me mordió. Le tenía mucho miedo. Mi madre creó un juego: ¡la primera a la que se le suba una hormiga gana una sorpresa! Desde entonces, corro hacia ellas. El reset: convertir un miedo en un juego.",en:"One day, an ant bit me. I was very scared of ants. My mom created a game: the first one to get an ant on their foot wins a surprise! Since then, I run towards ants. Reset: turning a fear into a game."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Les psychologues appellent ça le recadrage cognitif. Jazz appelle ça un reset du processeur.",es:"La palabra justa. Los psicólogos llaman a esto reencuadre cognitivo. Jazz lo llama un reset del procesador.",en:"The right word. Psychologists call this cognitive reframing. Jazz calls it a processor reset."}],
  // PAGE 22 — Détective de pensées
  [{type:"narrative",label:"Titre",fr:"Détective de pensées. Mène l'enquête : et si ton cerveau se trompait ?",es:"Detective de pensamientos. ¿Y si tu cerebro se equivocara?",en:"Thought detective. What if your brain was wrong?"},{type:"narrative",label:"Consigne",fr:"Imagine que tu n'as pas été invité·e à un anniversaire. Ton cerveau dit : Ils ne m'aiment pas. Trouve 3 autres explications possibles. La fête était limitée. On t'a oublié·e sans le faire exprès. L'invitation s'est perdue.",es:"Imagina que no te han invitado a un cumpleaños. Tu cerebro dice: No me quieren. Encuentra 3 explicaciones posibles. La fiesta estaba limitada. Te olvidaron sin querer. La invitación se perdió.",en:"Imagine you weren't invited to a birthday party. Your brain says: They don't like me. Find 3 other possible explanations. The party was limited. They forgot without meaning to. The invitation got lost."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Le radar social, c'est ta capacité à observer les signaux chez les autres : un regard, un silence, un ton de voix.",es:"La palabra justa. El radar social es tu capacidad para observar las señales en los demás: una mirada, un silencio, un tono de voz.",en:"The right word. The social radar is your ability to observe signals in others: a look, a silence, a tone of voice."},{type:"bubble",label:"Jazz",fr:"Moi, si je ne suis pas invité, c'est sûrement parce qu'il n'y aura pas de fromage.",es:"Yo, si no estoy invitado, seguramente es porque no habrá queso.",en:"Me, if I'm not invited, it's probably because there won't be cheese."}],
  // PAGE 23 — La Bulle des pensées
  [{type:"narrative",label:"Titre",fr:"La Bulle des pensées. Apprends à regarder tes pensées sans monter dedans.",es:"La Burbuja de los pensamientos. Aprende a mirar tus pensamientos sin subirte a ellos.",en:"The thought bubble. Learn to watch your thoughts without hopping on."},{type:"narrative",label:"Consigne",fr:"Ferme les yeux. Imagine que tes pensées sont des bulles qui flottent dans le ciel. Tu les regardes passer, sans les attraper, sans les juger.",es:"Cierra los ojos. Imagina que tus pensamientos son burbujas que flotan en el cielo. Las miras pasar, sin atraparlas, sin juzgarlas.",en:"Close your eyes. Imagine that your thoughts are bubbles floating in the sky. You watch them pass, without catching them, without judging them."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. C'est ce qu'on appelle la pleine conscience. Jazz appelle ça ne rien faire, mais avec talent.",es:"La palabra justa. Esto se llama atención plena. Jazz lo llama no hacer nada, pero con talento.",en:"The right word. This is called mindfulness. Jazz calls it doing nothing, but with talent."},{type:"bubble",label:"Jazz",fr:"Moi, mes bulles ont toujours une odeur de fromage. C'est magnifique.",es:"Mis burbujas siempre huelen a queso. Es magnífico.",en:"My bubbles always smell like cheese. It's magnificent."}],
  // PAGE 24 — Jeux des pensées
  [{type:"narrative",label:"Titre",fr:"Jeux des pensées. Retrouve les mots de la Mission 2 !",es:"Juegos de pensamientos. ¡Encuentra las palabras de la Misión 2!",en:"Thought games. Find the words from Mission 2!"},{type:"narrative",label:"Mots",fr:"Les mots : Pensée, Détective, Cerveau, Reset, Radar, Micro, Bulle, Fourmi.",es:"Las palabras: Pensamiento, Detective, Cerebro, Reset, Radar, Micrófono, Burbuja, Hormiga.",en:"The words: Thought, Detective, Brain, Reset, Radar, Microphone, Bubble, Ant."}],
  // PAGE 25 — Dessine-toi détective
  [{type:"narrative",label:"Titre",fr:"Dessine-toi en détective des pensées.",es:"Dibújate como detective de pensamientos.",en:"Draw yourself as a thought detective."},{type:"bubble",label:"Jazz",fr:"Moi, je dessine un fromage avec une loupe. Œuvre d'art.",es:"Yo dibujo un queso con una lupa. Obra de arte.",en:"I draw a cheese with a magnifying glass. Work of art."}],
  // PAGE 26 — Mission 2 terminée
  [{type:"narrative",label:"Titre",fr:"Mission 2 terminée ! Tu as appris à reconnaître les pensées What the Fuzz, à les transformer et à faire des resets. Badge : Détective des pensées.",es:"¡Misión 2 completada! Has aprendido a reconocer los pensamientos What the Fuzz, transformarlos y hacer resets. Insignia: Detective de pensamientos.",en:"Mission 2 complete! You learned to recognize What the Fuzz thoughts, transform them and reset. Badge: Thought detective."},{type:"bubble",label:"Jazz",fr:"Mission 2 OK. J'ai enquêté sur la disparition de mon fromage. Le suspect, c'est moi.",es:"Misión 2 OK. Investigué la desaparición de mi queso. El sospechoso soy yo.",en:"Mission 2 OK. I investigated the disappearance of my cheese. The suspect is me."}],
  // PAGE 27 — Mission 3 ouverture
  [{type:"narrative",label:"Titre",fr:"Mission 3 : Mission Confiance. Découvre tes super-pouvoirs cachés.",es:"Misión 3: Misión Confianza. Descubre tus superpoderes ocultos.",en:"Mission 3: Mission Confidence. Discover your hidden superpowers."},{type:"bubble",label:"Ángeles",fr:"Salut les super-héros ! Ici Ángeles. Tous les soirs, avant de me coucher, je raconte à ma mère mes cadeaux de la journée. Pas des jouets, non. Des cadeaux comme : Aujourd'hui j'ai été remerciée, j'ai un lit chaud, maman était là. C'est mon rituel des victoires. Et je me sens plus forte, plus confiante.",es:"¡Hola superhéroes! Aquí Ángeles. Cada noche, antes de dormir, le cuento a mi madre mis regalos del día. No juguetes, no. Regalos como: Hoy me dieron las gracias, tengo una cama calentita, mamá estaba ahí. Es mi ritual de las victorias. Y me siento más fuerte, más segura.",en:"Hi superheroes! Ángeles here. Every evening, before bed, I tell my mom my gifts of the day. Not toys, no. Gifts like: Today someone thanked me, I have a warm bed, mom was there. It's my victory ritual. And I feel stronger, more confident."},{type:"bubble",label:"Jazz",fr:"Moi, mon cadeau de la journée, c'est toujours le fromage. Et toi ?",es:"Mi regalo del día siempre es el queso. ¿Y el tuyo?",en:"My gift of the day is always cheese. What's yours?"},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. La gratitude, c'est savoir reconnaître les bonnes choses de la vie, même les toutes petites.",es:"La palabra justa. La gratitud es saber reconocer las cosas buenas de la vida, incluso las más pequeñas.",en:"The right word. Gratitude is knowing how to recognize the good things in life, even the very small ones."}],
  // PAGE 28 — Tes super-pouvoirs
  [{type:"narrative",label:"Titre",fr:"Tes super-pouvoirs. Découvre les forces qui dorment en toi.",es:"Tus superpoderes. Descubre las fuerzas que duermen en ti.",en:"Your superpowers. Discover the strengths sleeping inside you."},{type:"narrative",label:"Liste",fr:"Curiosité, Humour, Gentillesse, Persévérance, Imagination, Courage, Écoute, Gratitude, Patience, Créativité, Joie, Justice. Entoure 3 super-pouvoirs qui te ressemblent !",es:"Curiosidad, Humor, Amabilidad, Perseverancia, Imaginación, Valor, Escucha, Gratitud, Paciencia, Creatividad, Alegría, Justicia. ¡Rodea 3 superpoderes que se parezcan a ti!",en:"Curiosity, Humor, Kindness, Perseverance, Imagination, Courage, Listening, Gratitude, Patience, Creativity, Joy, Fairness. Circle 3 superpowers that feel like you!"},{type:"bubble",label:"Jazz",fr:"Mon super-pouvoir, c'est de sentir le fromage à 100 mètres.",es:"Mi superpoder es oler el queso a 100 metros.",en:"My superpower is smelling cheese from 100 meters away."}],
  // PAGE 29 — BD du super-pouvoir
  [{type:"narrative",label:"Titre",fr:"La BD du super-pouvoir. Imagine une histoire où ton super-pouvoir t'aide.",es:"El cómic del superpoder. Imagina una historia donde tu superpoder te ayuda.",en:"The superpower comic. Imagine a story where your superpower helps you."},{type:"bubble",label:"Jazz",fr:"Moi, ma BD raconte comment j'ai sauvé un fromage d'un incendie. Héroïque.",es:"Mi cómic cuenta cómo salvé un queso de un incendio. Heroico.",en:"My comic tells how I saved a cheese from a fire. Heroic."}],
  // PAGE 30 — Super-pouvoir du dessin
  [{type:"narrative",label:"Titre",fr:"Le super-pouvoir du dessin.",es:"El superpoder del dibujo.",en:"The drawing superpower."},{type:"bubble",label:"Ángeles",fr:"Un jour, j'ai dessiné une scène très précise dans mon carnet. Des semaines plus tard, la scène s'était réalisée exactement comme je l'avais imaginée. Ma mère m'a expliqué que c'est la visualisation : quand on dessine quelque chose, on entraîne son cerveau à le voir et à le créer.",es:"Un día dibujé una escena muy precisa en mi cuaderno. Semanas después, la escena se había hecho realidad exactamente como la había imaginado. Mi madre me explicó que eso es la visualización: cuando dibujamos algo, entrenamos nuestro cerebro para verlo y crearlo.",en:"One day I drew a very precise scene in my notebook. Weeks later, the scene had come true exactly as I had imagined it. My mom explained that this is visualization: when we draw something, we train our brain to see it and create it."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. La visualisation active les mêmes zones cérébrales que l'action réelle. Dessiner ce que tu veux vivre, c'est déjà l'entraîner.",es:"La palabra justa. La visualización activa las mismas zonas cerebrales que la acción real. Dibujar lo que quieres vivir ya es entrenarlo.",en:"The right word. Visualization activates the same brain areas as real action. Drawing what you want to experience is already training it."}],
  // PAGE 31 — Jeu des qualités
  [{type:"narrative",label:"Titre",fr:"Le jeu des qualités. Relie chaque situation à la qualité qu'elle montre.",es:"El juego de las cualidades. Une cada situación con la cualidad que muestra.",en:"The qualities game. Match each situation to the quality it shows."},{type:"narrative",label:"Consigne",fr:"Tu aides un ami → Gentillesse. Tu continues après une erreur → Persévérance. Tu dis merci → Gratitude. Tu inventes une histoire → Créativité. Tu oses parler → Courage. Tu écoutes sans couper → Écoute.",es:"Ayudas a un amigo → Amabilidad. Sigues tras un error → Perseverancia. Das las gracias → Gratitud. Inventas una historia → Creatividad. Te atreves a hablar → Valor. Escuchas sin interrumpir → Escucha.",en:"You help a friend → Kindness. You keep going after a mistake → Perseverance. You say thank you → Gratitude. You invent a story → Creativity. You dare to speak → Courage. You listen → Listening."},{type:"bubble",label:"Jazz",fr:"Moi, je relie fromage à bonheur. C'est facile, ce jeu.",es:"Yo uno queso con felicidad. Es fácil, este juego.",en:"I match cheese with happiness. This game is easy."}],
  // PAGE 32 — Gratitude
  [{type:"narrative",label:"Titre",fr:"Le super-pouvoir de la gratitude.",es:"El superpoder de la gratitud.",en:"The superpower of gratitude."},{type:"narrative",label:"Consigne",fr:"Choisis 3 cadeaux de ta journée. Écris-les ou dessine-les.",es:"Elige 3 regalos de tu día. Escríbelos o dibújalos.",en:"Choose 3 gifts from your day. Write them or draw them."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. La gratitude active les zones du bonheur dans ton cerveau. Plus tu dis merci, plus ton cerveau apprend à voir le positif.",es:"La palabra justa. La gratitud activa las zonas de la felicidad en tu cerebro. Cuanto más dices gracias, más aprende tu cerebro a ver lo positivo.",en:"The right word. Gratitude activates the happiness zones in your brain. The more you say thank you, the more your brain learns to see the positive."},{type:"bubble",label:"Jazz",fr:"Je suis reconnaissant pour le fromage. Et aussi pour le fromage.",es:"Estoy agradecido por el queso. Y también por el queso.",en:"I'm grateful for cheese. And also for cheese."}],
  // PAGE 33 — Devine mon cadeau
  [{type:"narrative",label:"Titre",fr:"Devine mon cadeau ! Mime tes trésors du jour.",es:"¡Adivina mi regalo! Mima tus tesoros del día.",en:"Guess my gift! Mime your treasures of the day."},{type:"narrative",label:"Consigne",fr:"Choisis une catégorie, trouve un cadeau du jour, mime-le sans parler. Catégories : À la maison, Dans la nature, À manger, Une personne, Un moment drôle. Défis bonus : En sautant, Sur une jambe, Au ralenti.",es:"Elige una categoría, encuentra un regalo del día, mímalo sin hablar. Categorías: En casa, En la naturaleza, De comer, Una persona, Un momento divertido. Desafíos: Saltando, Sobre una pierna, A cámara lenta.",en:"Choose a category, find a gift, mime it without speaking. Categories: At home, In nature, Food, A person, A funny moment. Bonus: Jumping, On one leg, In slow motion."},{type:"bubble",label:"Jazz",fr:"Moi, je mime un fromage. Personne ne devine jamais.",es:"Yo mimo un queso. Nunca nadie lo adivina.",en:"I mime a cheese. Nobody ever guesses."}],
  // PAGE 34 — Posture du super-héros
  [{type:"narrative",label:"Titre",fr:"La posture du super-héros. Ton corps peut envoyer de la confiance à ton cerveau.",es:"La postura del superhéroe. Tu cuerpo puede enviar confianza a tu cerebro.",en:"The superhero pose. Your body can send confidence to your brain."},{type:"narrative",label:"Consigne",fr:"Mets-toi debout, écarte les jambes, mains sur les hanches, relève la tête. Garde cette posture 30 secondes.",es:"Ponte de pie, separa las piernas, manos en las caderas, levanta la cabeza. Mantén la postura 30 segundos.",en:"Stand up, spread your legs, hands on hips, lift your head. Hold this pose for 30 seconds."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Cette posture dit à ton cerveau : je suis prêt·e, j'ai confiance.",es:"La palabra justa. Esta postura le dice a tu cerebro: estoy listo o lista, tengo confianza.",en:"The right word. This pose tells your brain: I'm ready, I'm confident."},{type:"bubble",label:"Jazz",fr:"Moi, je fais la posture du fromage. C'est la même, mais avec un fromage dans la bouche.",es:"Yo hago la postura del queso. Es la misma, pero con un queso en la boca.",en:"I do the cheese pose. Same thing, but with a cheese in my mouth."}],
  // PAGE 35 — Dessine-toi Mission 3
  [{type:"narrative",label:"Titre",fr:"Dessine-toi avec ton super-pouvoir. Montre le super-héros qui est en toi !",es:"Dibújate con tu superpoder. ¡Muestra el superhéroe que hay en ti!",en:"Draw yourself with your superpower. Show the superhero inside you!"},{type:"bubble",label:"Jazz",fr:"Moi, je me dessine avec une cape et un fromage géant.",es:"Yo me dibujo con una capa y un queso gigante.",en:"I draw myself with a cape and a giant cheese."}],
  // PAGE 36 — Bouclier de confiance
  [{type:"narrative",label:"Titre",fr:"Mon bouclier de confiance. Tes forces sont ton armure de super-héros.",es:"Mi escudo de confianza. Tus fortalezas son tu armadura de superhéroe.",en:"My confidence shield. Your strengths are your superhero armor."},{type:"narrative",label:"Consigne",fr:"Dessine ou écris tes forces à l'intérieur du bouclier.",es:"Dibuja o escribe tus fortalezas dentro del escudo.",en:"Draw or write your strengths inside the shield."},{type:"bubble",label:"Jazz",fr:"Mon bouclier est en fromage. Il est solide, mais il fond au soleil.",es:"Mi escudo es de queso. Es sólido, pero se derrite al sol.",en:"My shield is made of cheese. It's solid, but it melts in the sun."}],
  // PAGE 37 — Lettre à moi-même
  [{type:"narrative",label:"Titre",fr:"Ma lettre à moi-même. Une phrase qui te donne de la force.",es:"Mi carta para mí. Una frase que te dé fuerza.",en:"My letter to myself. A sentence that gives you strength."},{type:"narrative",label:"Consigne",fr:"Écris une phrase encourageante pour toi-même, celle que tu aimerais lire quand tu doutes.",es:"Escribe una frase que te anime, la que te gustaría leer cuando dudas.",en:"Write an encouraging sentence for yourself, the one you'd like to read when you doubt."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Se parler avec bienveillance, c'est de l'auto-compassion.",es:"La palabra justa. Hablarse con bondad es autocompasión.",en:"The right word. Speaking kindly to yourself is self-compassion."},{type:"bubble",label:"Jazz",fr:"Ma lettre dit : N'oublie jamais le fromage. C'est profond.",es:"Mi carta dice: Nunca olvides el queso. Es profundo.",en:"My letter says: Never forget the cheese. It's deep."}],
  // PAGE 38 — XP Mission 3
  [{type:"narrative",label:"XP Mission 3",fr:"Ton compteur d'XP Mission 3. Niveau 1 à 10 : super-pouvoirs, BD, dessin, qualités, gratitude, mime, posture, dessine-toi, bouclier, lettre.",es:"Tu contador de XP Misión 3. Niveles 1 a 10: superpoderes, cómic, dibujo, cualidades, gratitud, mímica, postura, dibújate, escudo, carta.",en:"Your XP counter Mission 3. Levels 1 to 10: superpowers, comic, drawing, qualities, gratitude, mime, pose, draw yourself, shield, letter."},{type:"bubble",label:"Jazz",fr:"1000 XP ? C'est presque autant que mes fromages.",es:"¿1000 XP? Es casi tanto como mis quesos.",en:"1000 XP? That's almost as many as my cheeses."}],
  // PAGE 39 — Mission 3 terminée
  [{type:"narrative",label:"Titre",fr:"Mission 3 terminée ! Bravo ! Tes super-pouvoirs sont réveillés. Badge : Super-héros de la confiance.",es:"¡Misión 3 completada! ¡Bravo! Tus poderes están despiertos. Insignia: Superhéroe de la confianza.",en:"Mission 3 complete! Well done! Your powers are awake. Badge: Confidence superhero."},{type:"bubble",label:"Jazz",fr:"Mission 3 OK. Mes super-pouvoirs fromagers sont au maximum.",es:"Misión 3 OK. Mis superpoderes queseros están al máximo.",en:"Mission 3 OK. My cheese superpowers are at maximum."}],
  // PAGE 40 — Mission 4 ouverture
  [{type:"narrative",label:"Titre",fr:"Mission 4 : Les mots qui protègent.",es:"Misión 4: Las palabras que protegen.",en:"Mission 4: Words that protect."},{type:"bubble",label:"Ángeles",fr:"Salut les super-héros ! Ici Ángeles. Ma mère est revenue triste d'un rendez-vous. Une personne lui avait dit des mots méchants. Je l'ai prise dans mes bras et j'ai dit : Maman, tu as le droit de pleurer. Quand je vais mal, tu es là pour moi. Alors maintenant, c'est moi qui suis là pour toi. Les mots peuvent blesser, mais aussi protéger, consoler, réparer.",es:"¡Hola superhéroes! Aquí Ángeles. Mi madre volvió triste de una cita. Alguien le había dicho palabras feas. La abracé y le dije: Mamá, tienes derecho a llorar. Cuando yo estoy mal, tú estás ahí. Ahora soy yo quien está aquí para ti. Las palabras pueden herir, pero también proteger, consolar, reparar.",en:"Hi superheroes! Ángeles here. My mom came back sad from an appointment. Someone had said mean words to her. I hugged her and said: Mom, you have the right to cry. When I'm feeling down, you're there for me. So now I'm here for you. Words can hurt, but also protect, comfort, repair."},{type:"bubble",label:"Jazz",fr:"Moi, mon mot-bouclier préféré, c'est fromage.",es:"Mi palabra-escudo favorita es queso.",en:"My favorite shield-word is cheese."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Les mots-boucliers sont des phrases pour se protéger, dire ce qu'on ressent, poser une limite ou consoler.",es:"La palabra justa. Las palabras-escudo son frases para protegerse, decir lo que sentimos, poner un límite o consolar.",en:"The right word. Shield-words are sentences to protect ourselves, say what we feel, set a limit or comfort someone."}],
  // PAGE 41 — Laboratoire des mots
  [{type:"narrative",label:"Titre",fr:"Le laboratoire des mots. Entoure les phrases qui ne sont pas justes.",es:"El laboratorio de las palabras. Rodea las frases que no son justas.",en:"The word laboratory. Circle the sentences that are not fair."},{type:"narrative",label:"Consigne",fr:"Bravo tu as réussi : juste. Tu es nul ou nulle : pas juste. C'est toujours ta faute : pas juste. Merci de m'avoir aidé : juste. Tu veux jouer avec nous : juste. Arrête de pleurer c'est rien : pas juste. Tu ne comprends jamais rien : pas juste.",es:"Bravo lo has conseguido: justa. Eres un desastre: no justa. Siempre es culpa tuya: no justa. Gracias por ayudarme: justa. ¿Quieres jugar?: justa. Deja de llorar no es nada: no justa. Nunca entiendes nada: no justa.",en:"Well done you did it: fair. You are useless: not fair. It's always your fault: not fair. Thank you for helping me: fair. Do you want to play: fair. Stop crying it's nothing: not fair. You never understand anything: not fair."},{type:"bubble",label:"Jazz",fr:"Je détecte surtout les phrases qui parlent de fromage.",es:"Yo detecto sobre todo las frases que hablan de queso.",en:"I mainly detect sentences that talk about cheese."}],
  // PAGE 42 — La présence qui protège
  [{type:"narrative",label:"Titre",fr:"La présence qui protège. Parfois, être là sans rien dire est le plus beau des boucliers.",es:"La presencia que protege. A veces, estar ahí sin decir nada es el más hermoso de los escudos.",en:"The presence that protects. Sometimes, being there without saying anything is the most beautiful shield."},{type:"bubble",label:"Jazz",fr:"Quand l'humaine mère est triste, je pose ma tête sur ses genoux. Ça marche mieux que les mots.",es:"Cuando la humana madre está triste, apoyo mi cabeza en sus rodillas. Funciona mejor que las palabras.",en:"When the human mom is sad, I lay my head on her lap. It works better than words."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Être là pour quelqu'un, c'est de la corégulation. Jazz appelle ça un Wifi du cœur.",es:"La palabra justa. Estar ahí para alguien es corregulación. Jazz lo llama Wifi del corazón.",en:"The right word. Being there for someone is coregulation. Jazz calls it Heart Wifi."}],
  // PAGE 43 — Dessine-toi avec tes mots-boucliers
  [{type:"narrative",label:"Titre",fr:"Dessine-toi avec tes mots-boucliers.",es:"Dibújate con tus palabras-escudo.",en:"Draw yourself with your shield-words."},{type:"bubble",label:"Jazz",fr:"Sur mon bouclier : Fromage. Simple, efficace, et ça sent bon.",es:"En mi escudo: Queso. Simple, eficaz, y huele bien.",en:"On my shield: Cheese. Simple, effective, and smells good."}],
  // PAGE 44 — XP Mission 4
  [{type:"narrative",label:"XP Mission 4",fr:"Ton compteur d'XP Mission 4. Niveaux 1 à 6 : cartes empathie, observer les phrases, bouclier de mots, défi des mots, présence qui protège, dessine-toi.",es:"Tu contador de XP Misión 4. Niveles 1 a 6.",en:"Your XP counter Mission 4. Levels 1 to 6."},{type:"bubble",label:"Jazz",fr:"600 XP ? C'est presque autant que mes réserves de fromage.",es:"¿600 XP? Es casi tanto como mis reservas de queso.",en:"600 XP? That's almost as much as my cheese reserves."}],
  // PAGE 45 — Mission 4 terminée
  [{type:"narrative",label:"Titre",fr:"Mission 4 terminée ! Tu as appris à reconnaître les paroles injustes, répondre avec respect, et utiliser les mots-boucliers. Badge : Gardien des mots.",es:"¡Misión 4 completada! Has aprendido a reconocer frases injustas y usar palabras-escudo. Insignia: Guardián de las palabras.",en:"Mission 4 complete! You learned to recognize unfair sentences and use shield-words. Badge: Word guardian."},{type:"bubble",label:"Jazz",fr:"Mission 4 OK. Mon bouclier en fromage est prêt pour la Mission 5.",es:"Misión 4 OK. Mi escudo de queso está listo para la Misión 5.",en:"Mission 4 OK. My cheese shield is ready for Mission 5."}],
  // PAGE 46 — Mission 5 ouverture
  [{type:"narrative",label:"Titre",fr:"Mission 5 : Super-héros de la planète.",es:"Misión 5: Superhéroes del planeta.",en:"Mission 5: Planet superheroes."},{type:"bubble",label:"Ángeles",fr:"Salut les super-héros ! Ici Ángeles. Un jour dans la montagne, j'ai trouvé une bouteille par terre. Je l'ai ramassée et gardée à la main pendant toute la promenade. Ce n'était pas grand-chose, juste une bouteille. Mais si chacun fait un petit geste, la planète va mieux.",es:"¡Hola superhéroes! Aquí Ángeles. Un día en la montaña encontré una botella tirada. La recogí y la llevé en la mano durante todo el paseo. No fue gran cosa, solo una botella. Pero si cada uno hace un pequeño gesto, el planeta va mejor.",en:"Hi superheroes! Ángeles here. One day in the mountain, I found a bottle on the ground. I picked it up and carried it the whole walk. It wasn't a big thing, just a bottle. But if everyone does a little gesture, the planet gets better."},{type:"bubble",label:"Jazz",fr:"Les lézards, c'est mon geste écolo. Je les observe, mais je les mange pas.",es:"Los lagartos son mi gesto ecológico. Los observo, pero no me los como.",en:"Lizards are my eco gesture. I watch them, but I don't eat them."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Un petit geste pour la planète, c'est un super-pouvoir qui grandit avec l'habitude.",es:"La palabra justa. Un pequeño gesto para el planeta es un superpoder que crece con la costumbre.",en:"The right word. A little gesture for the planet is a superpower that grows with habit."}],
  // PAGE 47 — Super-pouvoirs de la planète
  [{type:"narrative",label:"Titre",fr:"Les super-pouvoirs de la planète.",es:"Los superpoderes del planeta.",en:"The planet's superpowers."},{type:"narrative",label:"Gestes",fr:"Ramasser 3 déchets. Planter une graine. Éteindre la lumière. Fermer le robinet. Parler de la nature. Inventer mon propre geste.",es:"Recoger 3 residuos. Plantar una semilla. Apagar la luz. Cerrar el grifo. Hablar de la naturaleza. Inventar mi propio gesto.",en:"Pick up 3 pieces of trash. Plant a seed. Turn off the light. Turn off the tap. Talk about nature. Invent my own gesture."},{type:"bubble",label:"Jazz",fr:"Mon geste écolo préféré : finir tout le fromage pour ne pas gaspiller.",es:"Mi ecogesto favorito: terminarme todo el queso para no desperdiciar.",en:"My favorite eco gesture: finish all the cheese so there's no waste."}],
  // PAGE 48 — Jeu des écogestes
  [{type:"narrative",label:"Titre",fr:"Le jeu des écogestes. Relie chaque geste à ce qu'il apporte.",es:"El juego de los ecogestos. Une cada gesto con lo que aporta.",en:"The eco-gestures game. Match each gesture to what it brings."},{type:"narrative",label:"Consigne",fr:"Ramasser un déchet → chemin plus joli. Planter une graine → nouvelle plante. Éteindre la lumière → économiser l'énergie. Fermer le robinet → économiser l'eau. Parler de la nature → donner envie aux autres.",es:"Recoger un residuo → camino más bonito. Plantar una semilla → nueva planta. Apagar la luz → ahorrar energía. Cerrar el grifo → ahorrar agua. Hablar de la naturaleza → dar ganas a los demás.",en:"Pick up trash → prettier path. Plant a seed → new plant grows. Turn off light → save energy. Turn off tap → save water. Talk about nature → inspire others."},{type:"bubble",label:"Jazz",fr:"Mon écogeste ultime : finir tout le fromage pour ne pas gaspiller.",es:"Mi ecogesto definitivo: terminarme todo el queso para no desperdiciar.",en:"My ultimate eco-gesture: finish all the cheese so there's no waste."}],
  // PAGE 49 — Posture de l'arbre
  [{type:"narrative",label:"Titre",fr:"La posture de l'arbre. Enracine-toi comme un arbre.",es:"La postura del árbol. Enraízate como un árbol.",en:"The tree pose. Root yourself like a tree."},{type:"narrative",label:"Consigne",fr:"Debout, écarte les jambes, tends les bras vers le ciel, respire doucement. Imagine tes pieds s'enfoncer comme des racines. 30 secondes.",es:"De pie, separa las piernas, estira los brazos al cielo, respira suavemente. Imagina tus pies hundiéndose como raíces. 30 segundos.",en:"Stand up, spread legs, stretch arms to the sky, breathe gently. Imagine your feet sinking like roots. 30 seconds."},{type:"narrative",label:"Le mot juste",fr:"Le mot juste. Cette posture t'ancre au sol comme un arbre. Elle calme ton processeur.",es:"La palabra justa. Esta postura te ancla al suelo como un árbol. Calma tu procesador.",en:"The right word. This pose anchors you to the ground like a tree. It calms your processor."},{type:"bubble",label:"Jazz",fr:"Moi, je fais la posture du chien couché. C'est plus adapté.",es:"Yo hago la postura del perro tumbado. Es más adaptada.",en:"I do the lying dog pose. It's more suited to my level."}],
  // PAGE 50 — Défi pour la planète
  [{type:"narrative",label:"Titre",fr:"Le défi pour la planète. Un geste pour la Terre, à faire et à partager !",es:"El desafío para el planeta. ¡Un gesto para la Tierra, para hacer y compartir!",en:"The planet challenge. A gesture for the Earth, to do and share!"},{type:"narrative",label:"Défis",fr:"Ramasser 3 déchets et filmer. Fabriquer des bombes à graines. Mini potager dans une boîte d'œufs. Construire un nichoir. Hashtag PsyLinguaGreenChallenge.",es:"Recoger 3 residuos y grabarlo. Fabricar bombas de semillas. Mini huerto en caja de huevos. Construir casita para pájaros. Hashtag PsyLinguaGreenChallenge.",en:"Pick up 3 pieces of trash and film it. Make seed bombs. Mini garden in an egg box. Build a birdhouse. Hashtag PsyLinguaGreenChallenge."},{type:"bubble",label:"Jazz",fr:"Mon défi : lécher chaque fromage de la maison pour vérifier leur qualité.",es:"Mi desafío: lamer cada queso de la casa para verificar su calidad.",en:"My challenge: lick every cheese in the house to check their quality."}],
  // PAGE 51 — Dessine-toi super-héros planète
  [{type:"narrative",label:"Titre",fr:"Dessine-toi en super-héros de la planète.",es:"Dibújate como superhéroe del planeta.",en:"Draw yourself as a planet superhero."},{type:"bubble",label:"Jazz",fr:"Ma cape est en fromage. Ça tient chaud, mais ça attire les souris.",es:"Mi capa es de queso. Da calor, pero atrae a los ratones.",en:"My cape is made of cheese. It keeps me warm, but it attracts mice."}],
  // PAGE 52 — XP Mission 5
  [{type:"narrative",label:"XP Mission 5",fr:"Ton compteur d'XP Mission 5. Niveaux 1 à 7 : super-pouvoirs planète, chasse aux trésors, écogestes, posture arbre, défi planète, dessine-toi, Mission 5 terminée !",es:"Tu contador de XP Misión 5. Niveles 1 a 7.",en:"Your XP counter Mission 5. Levels 1 to 7."},{type:"bubble",label:"Jazz",fr:"700 XP ? C'est plus haut que la pile de fromages dans ma niche !",es:"¿700 XP? ¡Es más alto que la pila de quesos en mi caseta!",en:"700 XP? That's taller than the pile of cheeses in my doghouse!"}],
  // PAGE 53 — Mission 5 terminée
  [{type:"narrative",label:"Titre",fr:"Mission 5 terminée ! La planète compte sur toi. Badge : Super-héros de la planète.",es:"¡Misión 5 completada! El planeta cuenta contigo. Insignia: Superhéroe del planeta.",en:"Mission 5 complete! The planet is counting on you. Badge: Planet superhero."},{type:"bubble",label:"Jazz",fr:"Mission 5 OK. J'ai recyclé trois fromages et sauvé un lézard.",es:"Misión 5 OK. He reciclado tres quesos y salvado un lagarto.",en:"Mission 5 OK. I recycled three cheeses and saved a lizard."}],
  // PAGE 54 — Solutions
  [{type:"narrative",label:"Titre",fr:"Solutions des jeux. Vérifie tes réponses !",es:"Soluciones de los juegos. ¡Comprueba tus respuestas!",en:"Game solutions. Check your answers!"},{type:"bubble",label:"Jazz",fr:"Moi, j'avais toutes les réponses. Sauf celles où la réponse n'était pas fromage.",es:"Yo tenía todas las respuestas. Excepto aquellas donde la respuesta no era queso.",en:"I had all the answers. Except the ones where the answer wasn't cheese."}],
  // PAGE 55 — Journal de Bord intro
  [{type:"narrative",label:"Titre",fr:"Ton Journal de Bord des 70 jours. La constance est ton super-pouvoir secret.",es:"Tu Diario de a Bordo de 70 días. La constancia es tu superpoder secreto.",en:"Your 70-Day Logbook. Consistency is your secret superpower."},{type:"narrative",label:"Texte",fr:"Tu as accompli tes 5 missions. Mais pour que les super-pouvoirs restent dans ton cerveau, entraîne-les un peu chaque jour. La science dit qu'en 70 jours, une petite habitude peut changer ton cerveau pour de bon. Chaque jour : fais ton rituel, écris une petite phrase, colorie une case.",es:"Has cumplido tus 5 misiones. Pero para que los superpoderes se queden en tu cerebro, entrénalos un poco cada día. La ciencia dice que en 70 días, un pequeño hábito puede cambiar tu cerebro para siempre. Cada día: haz tu ritual, escribe una pequeña frase, colorea una casilla.",en:"You've completed your 5 missions. But for the superpowers to stay in your brain, train them a little each day. Science says that in 70 days, a small habit can change your brain for good. Every day: do your ritual, write a little sentence, color in a box."},{type:"bubble",label:"Jazz",fr:"Mon rituel quotidien : vérifier que le fromage est toujours à sa place.",es:"Mi ritual diario: verificar que el queso sigue en su sitio.",en:"My daily ritual: check that the cheese is still in its place."}],
  // PAGES 56-59 — Journal de Bord
  [{type:"narrative",label:"Journal jours 1-18",fr:"Mon Journal de Bord, jours 1 à 18.",es:"Mi Diario de a Bordo, días 1 a 18.",en:"My Logbook, days 1 to 18."},{type:"bubble",label:"Jazz",fr:"18 jours, c'est 18 fromages. Un bon début !",es:"18 días son 18 quesos. ¡Un buen comienzo!",en:"18 days is 18 cheeses. A good start!"}],
  [{type:"narrative",label:"Journal jours 19-36",fr:"Mon Journal de Bord, jours 19 à 36.",es:"Mi Diario de a Bordo, días 19 a 36.",en:"My Logbook, days 19 to 36."},{type:"bubble",label:"Jazz",fr:"36 jours, c'est 36 fromages. La pile commence à être haute !",es:"36 días son 36 quesos. ¡La pila empieza a ser alta!",en:"36 days is 36 cheeses. The pile is getting tall!"}],
  [{type:"narrative",label:"Journal jours 37-53",fr:"Mon Journal de Bord, jours 37 à 53.",es:"Mi Diario de a Bordo, días 37 a 53.",en:"My Logbook, days 37 to 53."},{type:"bubble",label:"Jazz",fr:"53 jours. Je commence à manquer de place dans ma niche !",es:"53 días. ¡Empiezo a quedarme sin sitio en mi caseta!",en:"53 days. I'm running out of space in my doghouse!"}],
  [{type:"narrative",label:"Journal jours 54-70",fr:"Mon Journal de Bord, jours 54 à 70.",es:"Mi Diario de a Bordo, días 54 a 70.",en:"My Logbook, days 54 to 70."},{type:"bubble",label:"Jazz",fr:"70 jours ! 70 fromages. Tu es un héros de la constance. Je te donne ma médaille.",es:"¡70 días! 70 quesos. Eres un héroe de la constancia. Te doy mi medalla.",en:"70 days! 70 cheeses. You are a consistency hero. I give you my medal."}],
  // PAGE 60 — Bilan 70 jours
  [{type:"narrative",label:"Titre",fr:"Bilan des 70 jours. Bravo super-héros ! Chaque petite case coloriée est une preuve que tu as entraîné ton cerveau.",es:"Balance de los 70 días. ¡Bravo superhéroe! Cada casilla coloreada es una prueba de que has entrenado tu cerebro.",en:"70-Day review. Well done superhero! Every colored-in box is proof that you've trained your brain."},{type:"bubble",label:"Jazz",fr:"70 jours de rituels ? C'est 70 fromages de sagesse.",es:"¿70 días de rituales? Son 70 quesos de sabiduría.",en:"70 days of rituals? That's 70 cheeses of wisdom."}],
  // PAGE 61 — Diplôme final
  [{type:"narrative",label:"Diplôme",fr:"Diplôme de super-héros. Tu as accompli les 5 missions et relevé le défi des 70 jours. Signé : Estrella la psychologue, Ángeles l'exploratrice, et Jazz l'expert mondial du fromage.",es:"Diploma de superhéroe. Has completado las 5 misiones y superado el desafío de los 70 días. Firmado: Estrella la psicóloga, Ángeles la exploradora, y Jazz el experto mundial del queso.",en:"Superhero diploma. You completed the 5 missions and conquered the 70-day challenge. Signed: Estrella the psychologist, Ángeles the explorer, and Jazz the world cheese expert."},{type:"bubble",label:"Jazz",fr:"J'ai signé avec ma patte. C'est un honneur.",es:"He firmado con mi pata. Es un honor.",en:"I signed with my paw. It's an honor."}],
  // PAGE 62 — Maintenant c'est facile
  [{type:"narrative",label:"Titre",fr:"Maintenant, c'est facile ! Trois moments où tu doutais… et où maintenant tu assures.",es:"¡Ahora es fácil! Tres momentos en los que dudabas… y ahora lo clavas.",en:"Now it's easy! Three moments when you used to doubt… and now you rock it."},{type:"narrative",label:"Situations",fr:"Parler en classe : avant, je vais bafouiller. Maintenant : j'ai osé. Aller vers les autres : avant, ils ne voudront pas de moi. Maintenant : j'y suis allé·e. Essayer quelque chose de nouveau : avant, je vais rater. Maintenant : j'essaie et j'apprends.",es:"Hablar en clase: antes, voy a tartamudear. Ahora: me atreví. Acercarse a los demás: antes, no me querrán. Ahora: fui. Intentar algo nuevo: antes, voy a fracasar. Ahora: lo intento y aprendo.",en:"Speaking in class: before, I'm going to stutter. Now: I dared. Going towards others: before, they won't want me. Now: I went for it. Trying something new: before, I'm going to fail. Now: I try and I learn."},{type:"bubble",label:"Jazz",fr:"Vous m'avez vu ? J'étais dans la dernière case. Une star, je vous dis.",es:"¿Me visteis? Salí en la última viñeta. Una estrella, os digo.",en:"Did you see me? I was in the last panel. A star, I tell you."}],
  // PAGE 63 — Bêtisier
  [{type:"narrative",label:"Titre",fr:"Le bêtisier de Mission Confiance. Parce que même les super-héros font des bêtises.",es:"Las tomas falsas de Misión Confianza. Porque incluso los superhéroes hacen tonterías.",en:"The Mission Confidence bloopers. Because even superheroes mess up."},{type:"bubble",label:"Jazz",fr:"Ça se mange, la régulation ?",es:"¿Se come, la regulación?",en:"Can you eat regulation?"},{type:"bubble",label:"Jazz",fr:"J'ai remplacé toutes les émotions par fromage. C'est plus clair.",es:"He reemplazado todas las emociones por queso. Es más claro.",en:"I replaced all emotions with cheese. It's clearer."},{type:"bubble",label:"Ángeles",fr:"On espère que tu as autant ri que nous !",es:"¡Esperamos que te hayas reído tanto como nosotros!",en:"We hope you laughed as much as we did!"},{type:"bubble",label:"Estrella",fr:"L'humour est un super-pouvoir.",es:"El humor es un superpoder.",en:"Humor is a superpower."},{type:"bubble",label:"Jazz",fr:"Surtout quand il est au fromage. Bon, j'ai faim.",es:"Sobre todo cuando es de queso. Bueno, tengo hambre.",en:"Especially when it's cheese-flavored. Well, I'm hungry."}],
  // PAGE 64 — Phrases cultes de Jazz
  [{type:"narrative",label:"Titre",fr:"Les phrases cultes de Jazz.",es:"Las frases célebres de Jazz.",en:"Jazz's cult quotes."},{type:"sound",text:"Catastrophe intraplanétaire !"},{type:"narrative",label:"",fr:"Quand une émotion très forte prend toute la place.",es:"Cuando una emoción muy fuerte lo ocupa todo.",en:"When a very strong emotion takes up all the space."},{type:"sound",text:"Reset du processeur. / Reset del procesador. / Processor reset."},{type:"narrative",label:"",fr:"Quand le cerveau a besoin de redémarrer.",es:"Cuando el cerebro necesita reiniciarse.",en:"When the brain needs to reboot."},{type:"sound",text:"Wifi du cœur. / Wifi del corazón. / Heart Wifi."},{type:"narrative",label:"",fr:"Quand on est là pour quelqu'un sans rien dire.",es:"Cuando estás ahí para alguien sin decir nada.",en:"When you are there for someone without saying anything."},{type:"sound",text:"What the fun !"},{type:"sound",text:"What the fuzz !"}],
  // PAGE 65 — Univers PsyLingua
  [{type:"narrative",label:"Titre",fr:"Découvre l'univers Psy lingoua !",es:"¡Descubre el universo Psi Lingua!",en:"Discover the PsyLingua universe!"},{type:"narrative",label:"BD",fr:"Le Chaos Megabass est disponible sur Amazon. Un concert non autorisé sème le chaos dans la nature. Ángeles et Jazz vont tout nettoyer.",es:"El Caos Megabass está disponible en Amazon. Un concierto no autorizado siembra el caos en la naturaleza. Ángeles y Jazz lo limpiarán todo.",en:"The Megabass Chaos is available on Amazon. An unauthorized concert causes chaos in nature. Ángeles and Jazz will clean everything up."},{type:"narrative",label:"Magazine",fr:"Le magazine interactif Psy lingoua est offert sur psylingua.com.",es:"La revista interactiva Psi Lingua es gratuita en psylingua.com.",en:"The PsyLingua interactive magazine is free at psylingua.com."},{type:"bubble",label:"Jazz",fr:"Rejoins la meute !",es:"¡Únete a la manada!",en:"Join the pack!"}],
  // PAGE 66 — Bientôt Les Bombes Plantées
  [{type:"narrative",label:"Titre",fr:"Bientôt : Les Bombes Plantées. La nouvelle aventure d'Ángeles et Jazz. Décembre 2026.",es:"Próximamente: Las Bombas Plantadas. La nueva aventura de Ángeles y Jazz. Diciembre 2026.",en:"Coming soon: The Planted Bombs. The new adventure of Ángeles and Jazz. December 2026."},{type:"bubble",label:"Jazz",fr:"Un atelier, des mensonges et de la mousse ? J'apporte le fromage.",es:"¿Un taller, mentiras y espuma? Yo traigo el queso.",en:"A workshop, lies and bubbles? I'll bring the cheese."}],
  // PAGE 67 — Mot aux parents
  [{type:"narrative",label:"Titre",fr:"Un petit mot d'Estrella aux parents.",es:"Una pequeña nota de Estrella para los padres.",en:"A little note from Estrella to parents."},{type:"narrative",label:"Texte",fr:"Chers parents, ce cahier est né de ma pratique de psychologue et de mon expérience de maman. Ma fille Ángeles, 12 ans, a grandi avec un TDAH et une hypersensibilité. Chaque outil a été testé avec elle dans notre quotidien. Derrière chaque activité, il y a des années de recherche en psychologie et neurosciences.",es:"Queridos padres, este cuaderno nació de mi práctica como psicóloga y mi experiencia como madre. Mi hija Ángeles, de 12 años, ha crecido con TDAH e hipersensibilidad. Cada herramienta fue probada con ella en nuestro día a día.",en:"Dear parents, this workbook was born from my practice as a psychologist and my experience as a mother. My daughter Ángeles, 12, grew up with ADHD and hypersensitivity. Every tool was first tested with her in our daily lives."}],
  // PAGE 68 — Piliers scientifiques
  [{type:"narrative",label:"Les 8 piliers",fr:"Les 8 piliers scientifiques. 1 : Nommer les émotions calme l'amygdale. 2 : La visualisation par le dessin active les mêmes zones que l'action réelle. 3 : La constance : 70 jours pour former une habitude. 4 : Le feedback visuel renforce l'auto-efficacité. 5 : Le recadrage cognitif change l'émotion. 6 : La posture du super-héros augmente la confiance. 7 : La pleine conscience s'apprend. 8 : La corégulation active le nerf vague.",es:"Los 8 pilares científicos. 1: Nombrar emociones calma la amígdala. 2: La visualización activa las mismas zonas que la acción real. 3: La constancia: 70 días para formar un hábito. 4: El feedback visual refuerza la autoeficacia. 5: El reencuadre cognitivo cambia la emoción. 6: La postura del superhéroe aumenta la confianza. 7: La atención plena se aprende. 8: La corregulación activa el nervio vago.",en:"The 8 scientific pillars. 1: Naming emotions calms the amygdala. 2: Visualization activates the same areas as real action. 3: Consistency: 70 days to form a habit. 4: Visual feedback reinforces self-efficacy. 5: Cognitive reframing changes the emotion. 6: The superhero pose increases confidence. 7: Mindfulness can be learned. 8: Coregulation activates the vagus nerve."}],
  // PAGE 69 — Conseils pratiques
  [{type:"narrative",label:"Conseils",fr:"Conseils pratiques. Faites confiance à votre enfant, il avance à son rythme. Intéressez-vous sans corriger : Qu'est-ce que tu as découvert ? Célébrez les XP et les diplômes. Si votre enfant vous tend son cahier, ouvrez-le. C'est son invitation dans son aventure de super-héros. Merci d'avoir accompagné votre enfant. La confiance grandit chaque fois qu'on l'utilise.",es:"Consejos prácticos. Confíe en su hijo, avanza a su ritmo. Interésese sin corregir: ¿Qué has descubierto? Celebre los XP y los diplomas. Si su hijo le tiende el cuaderno, ábralo. Es su invitación a su aventura de superhéroe. Gracias por acompañar a su hijo. La confianza crece cada vez que se usa.",en:"Practical advice. Trust your child, they go at their own pace. Take an interest without correcting: What did you discover? Celebrate the XP and diplomas. If your child hands you their workbook, open it. It's their invitation into their superhero adventure. Thank you for accompanying your child. Confidence grows every time it's used."},{type:"bubble",label:"Jazz",fr:"Je dis merci aux parents qui ont acheté ce cahier. Grâce à vous, j'aurai plus de fromage.",es:"Digo gracias a los padres que compraron este cuaderno. Gracias a ustedes, tendré más queso.",en:"I say thank you to the parents who bought this workbook. Thanks to you, I'll have more cheese."}],
  // PAGE 70 — Dernière page
  [{type:"sound",text:"WHAT THE FUZZ ?"},{type:"bubble",label:"Ángeles",fr:"Tu as déjà fini le cahier ? Bravo super-héros ! Jazz s'est caché dans une page avec un détail bizarre. Sauras-tu le retrouver ?",es:"¿Ya terminaste el cuaderno? ¡Bravo, superhéroe! Jazz se escondió en una página con un detalle raro. ¿Podrás encontrarlo?",en:"You already finished the workbook? Well done, superhero! Jazz hid in a page with a weird detail. Can you find it?"},{type:"sound",text:"WHAT THE FUN !"}]
];

// ═══════════ MOTEUR ═══════════
let currentPage=0,isPlaying=false,speed=1,queue=[],queueIdx=0;
const langCodes={fr:'fr-FR',es:'es-ES',en:'en-GB'};
const langFlags={fr:'🇫🇷',es:'🇪🇸',en:'🇬🇧'};
const langLabels={fr:'Français',es:'Español',en:'English'};

function init(){document.getElementById('totalPagesNum').textContent=pages.length;buildDots();loadPage(0);}
function buildDots(){const c=document.getElementById('pageDots');c.innerHTML='';pages.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' current':'');d.id='dot-'+i;c.appendChild(d);});}
function loadPage(idx){stopSpeech();currentPage=idx;queueIdx=0;queue=[];document.getElementById('currentPageNum').textContent=idx+1;document.getElementById('langStatus').textContent='Appuie sur ▶ / Pulsa ▶ / Press ▶';document.getElementById('progressFill').style.width='0%';document.getElementById('btnPrev').disabled=idx===0;document.getElementById('btnNext').disabled=idx===pages.length-1;const wtf=document.getElementById('wtfBadge');wtf.textContent='';wtf.classList.remove('visible');const blocksEl=document.getElementById('contentBlocks');blocksEl.innerHTML='';pages[idx].forEach((block,bi)=>{if(block.type==='sound'){const el=document.createElement('div');el.className='block-sound';el.id='block-'+bi;el.innerHTML=`<div class="sound-text">${block.text}</div>`;blocksEl.appendChild(el);queue.push({text:block.text,lang:null,blockIdx:bi,lineId:null});}else{const isBubble=block.type==='bubble';const el=document.createElement('div');el.className=isBubble?'block-bubble':'block-narrative';el.id='block-'+bi;const icon=isBubble?'💬':'📖';const lbl=block.label||(isBubble?'Bulle':'Narrateur');el.innerHTML=`<div class="block-type">${icon} ${lbl}</div>`+buildLines(block,bi);blocksEl.appendChild(el);['fr','es','en'].forEach(lang=>{if(block[lang])queue.push({text:block[lang],lang,blockIdx:bi,lineId:`line-${bi}-${lang}`});});}});document.querySelectorAll('.dot').forEach((d,i)=>{d.className='dot'+(i===idx?' current':(i<idx?' done':''));});}
function buildLines(block,bi){return['fr','es','en'].map(lang=>`<div class="lang-line" id="line-${bi}-${lang}"><span class="lang-flag">${langFlags[lang]}</span><span class="lang-text-inline">${block[lang]||''}</span></div>`).join('');}
function togglePlay(){if(isPlaying)stopSpeech();else playNext();}
function playNext(){if(queueIdx>=queue.length){onComplete();return;}const item=queue[queueIdx];clearHL();document.querySelectorAll('.block-bubble').forEach(b=>b.classList.remove('active'));const bel=document.getElementById('block-'+item.blockIdx);if(bel)bel.classList.add('active');if(item.lineId){const l=document.getElementById(item.lineId);if(l)l.classList.add('speaking');}document.getElementById('progressFill').style.width=(queueIdx/queue.length*100)+'%';document.getElementById('langStatus').textContent=item.lang?langFlags[item.lang]+' '+langLabels[item.lang]+'…':'🔊 En cours…';const utt=new SpeechSynthesisUtterance(item.text);utt.lang=item.lang?langCodes[item.lang]:'fr-FR';utt.rate=speed;utt.onend=()=>{queueIdx++;if(isPlaying)setTimeout(playNext,item.lang==='en'?700:350);};utt.onerror=()=>{queueIdx++;if(isPlaying)playNext();};isPlaying=true;updateBtn(true);window.speechSynthesis.speak(utt);}
function stopSpeech(){isPlaying=false;window.speechSynthesis.cancel();updateBtn(false);document.getElementById('langStatus').textContent='En pause / En pausa / Paused';clearHL();}
function onComplete(){isPlaying=false;updateBtn(false);clearHL();document.getElementById('progressFill').style.width='100%';document.getElementById('langStatus').textContent='✓ Terminé / Terminado / Done!';const w=document.getElementById('wtfBadge');w.textContent=currentPage===pages.length-1?'WHAT THE FUN ! 🎉':'';w.classList.add('visible');}
function clearHL(){document.querySelectorAll('.lang-line').forEach(l=>l.classList.remove('speaking'));document.querySelectorAll('.block-bubble').forEach(b=>b.classList.remove('active'));}
function updateBtn(p){const b=document.getElementById('btnPlay');b.textContent=p?'⏸':'▶';b.classList.toggle('playing',p);}
function prevPage(){if(currentPage>0)loadPage(currentPage-1);}
function nextPage(){if(currentPage<pages.length-1)loadPage(currentPage+1);}
function setSpeed(s,btn){speed=s;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(isPlaying){stopSpeech();playNext();}}

init();
</script>
</body>
</html>
